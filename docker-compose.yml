services:
  db:
    image: mysql:8.0
    container_name: asistencia_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-RootPass2026!}
      MYSQL_DATABASE: ${DB_NAME:-asistencia_db}
      MYSQL_USER: ${DB_USER:-asistencia_user}
      MYSQL_PASSWORD: ${DB_PASS:-UserPass2026!}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - asistencia_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 15
      start_period: 60s

  redis:
    image: redis:alpine
    container_name: asistencia_redis
    restart: always
    networks:
      - asistencia_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asistencia_backend
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-asistencia_db}
      DB_USER: ${DB_USER:-asistencia_user}
      DB_PASS: ${DB_PASS:-UserPass2026!}
      JWT_SECRET: ${JWT_SECRET:-CambiaEsteSecretoEnProduccion2026!}
      REDIS_HOST: redis

    networks:
      - asistencia_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asistencia_worker
    restart: always
    command: ["php", "/var/www/html/worker.php"]
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-asistencia_db}
      DB_USER: ${DB_USER:-asistencia_user}
      DB_PASS: ${DB_PASS:-UserPass2026!}
      REDIS_HOST: redis

    networks:
      - asistencia_net
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asistencia_frontend
    restart: always
    networks:
      - asistencia_net
    depends_on:
      - backend

  webserver:
    image: nginx:alpine
    container_name: asistencia_webserver
    restart: always
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - asistencia_net
    depends_on:
      - backend
      - frontend

networks:
  asistencia_net:
    driver: bridge

volumes:
  db_data:
